<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p id="demo"></p>

    <script>
        const person = {
            firstname: "John",
            lastname: "Doe",
            age: 50,
        };

        delete person.age;

        document.getElementById("demo").innerHTML = person.firstname + " is " + person.age;
    </script>
